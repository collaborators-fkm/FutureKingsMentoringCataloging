services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fkm-catalog-postgres
    environment:
      POSTGRES_DB: presentations
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d presentations"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgvector-data:/var/lib/postgresql/data

  catalog-app:
    build:
      context: .
      dockerfile: Dockerfile.catalog-app
    container_name: fkm-catalog-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/presentations
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TENANT_ID: ${TENANT_ID:-}
      CLIENT_ID: ${CLIENT_ID:-}
      CLIENT_SECRET_VALUE: ${CLIENT_SECRET_VALUE:-}
      SITE_HOSTNAME: ${SITE_HOSTNAME:-}
      SITE_PATH: ${SITE_PATH:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
    ports:
      - "8000:8000"

volumes:
  pgvector-data:
